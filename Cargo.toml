[workspace]
resolver = "2"
members = [
	"crates/ultihighlighter",
	"crates/ultimd2html", 
	"crates/ultidocs-cli", 
	"crates/ultibuilder",
	"crates/ultiminify", 
	"crates/ultijson", 
	"crates/ultilinter",
]


[workspace.package]
version = "0.3.0"
authors = ["James Rose"]
# homepage = "https://tauri.app/"
repository = "https://github.com/RoseBlume/Ultidocs"
categories = ["web-development", "web-programming"]
license = "Apache-2.0 OR MIT"
edition = "2024"




[profile.release]
panic = "abort"
codegen-units = 1
lto = true
incremental = false
opt-level = 3
strip = true